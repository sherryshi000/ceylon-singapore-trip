<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>9/25-10/7 斯里兰卡 + 新加坡行程</title>
  <style>
    :root{--pink:#ee86aa;--purple:#8d62d6;--ink:#241f2d;--muted:#746c7f;--line:#efe7f1;--bg:#fbf8fb}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;color:var(--ink);background:linear-gradient(180deg,#fff,var(--bg))}
    header{position:sticky;top:0;z-index:2;display:flex;gap:12px;justify-content:space-between;align-items:center;padding:14px 5vw;background:rgba(255,255,255,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
    .brand{font-weight:800}.brand span{display:inline-grid;place-items:center;width:34px;height:34px;margin-right:8px;color:#fff;background:linear-gradient(135deg,var(--pink),var(--purple));border-radius:8px}
    nav{display:flex;gap:6px;overflow:auto}button,a.btn{border:0;border-radius:10px;padding:10px 14px;background:#fff;color:var(--ink);box-shadow:inset 0 0 0 1px var(--line);text-decoration:none;white-space:nowrap}button.primary,a.primary{color:#fff;background:linear-gradient(135deg,var(--pink),var(--purple));box-shadow:none}
    .hero{min-height:58vh;display:grid;align-items:end;padding:8vw 5vw;color:#fff;background:linear-gradient(90deg,rgba(28,18,36,.78),rgba(28,18,36,.15)),url("https://images.unsplash.com/photo-1586612968499-a620ded516e8?auto=format&fit=crop&w=1800&q=85") center/cover}
    h1{max-width:760px;margin:0;font-size:clamp(36px,8vw,82px);line-height:.96}h2{font-size:clamp(24px,4vw,38px);margin:0 0 16px}.eyebrow{color:var(--pink);font-weight:900;font-size:13px;margin:0 0 10px}
    .search{display:flex;gap:8px;max-width:680px;margin-top:24px;padding:8px;background:rgba(255,255,255,.94);border-radius:14px}.search input{flex:1;border:0;background:transparent;padding:0 10px;min-width:0}.search input:focus{outline:0}
    section{width:min(1180px,90vw);margin:auto;padding:56px 0}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.card,.panel,.day{background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 18px 48px rgba(72,56,84,.08);overflow:hidden}.card img{width:100%;aspect-ratio:4/3;object-fit:cover}.body{padding:14px}.pill{display:inline-block;margin:0 6px 8px 0;padding:6px 10px;border-radius:99px;background:#fff0f6;color:#74457c;font-size:12px;font-weight:800}
    p{color:var(--muted);line-height:1.65}.split{display:grid;grid-template-columns:1fr 360px;gap:18px}.panel{padding:16px}label{display:grid;gap:6px;margin:10px 0;color:var(--muted);font-weight:700;font-size:14px}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px;font:inherit}textarea{min-height:110px}
    .days{display:grid;gap:12px}.day{display:grid;grid-template-columns:56px 1fr;gap:12px;padding:14px}.idx{display:grid;place-items:center;width:50px;height:50px;border-radius:50%;color:#fff;background:linear-gradient(135deg,var(--pink),var(--purple));font-weight:900}
    .tablewrap{overflow:auto;margin-top:18px;border:1px solid var(--line);border-radius:8px;background:#fff}table{border-collapse:collapse;min-width:1080px;width:100%}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;font-size:14px;line-height:1.55}th{position:sticky;top:0;background:#fff0f6}
    .toast{position:fixed;right:16px;bottom:16px;padding:12px 14px;border-radius:10px;color:#fff;background:#241f2d;opacity:0;transform:translateY(8px);transition:.2s}.toast.show{opacity:1;transform:none}
    @media(max-width:860px){.grid,.split{grid-template-columns:1fr}.tablewrap{display:none}header{align-items:flex-start;flex-direction:column}.hero{min-height:620px}.search{flex-direction:column}.day{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header><div class="brand"><span>SG</span>Ceylon to Singapore</div><nav><button data-go="home">首页</button><button data-go="stops">目的地</button><button data-go="plan">行程表</button><button id="share">分享</button></nav></header>
  <main id="home">
    <div class="hero"><div><p class="eyebrow">SEP 25 - OCT 7</p><h1>从狮子岩、茶园山谷到新加坡海湾夜色</h1><form class="search" id="search"><input id="q" placeholder="搜索：Ella / Gardens by the Bay / 演唱会 / 机场"><button class="primary">搜索</button></form></div></div>
    <section id="stops"><p class="eyebrow">POPULAR STOPS</p><h2>热门目的地</h2><div class="grid" id="cards"></div></section>
    <section class="split"><div><p class="eyebrow">SAVED NOTES</p><h2>攻略推荐</h2><div id="guides" class="days"></div></div><aside class="panel"><h2>保存我的攻略</h2><form id="save"><label>标题<input name="title" required></label><label>内容<textarea name="content" required></textarea></label><button class="primary">保存攻略</button></form></aside></section>
    <section id="plan"><p class="eyebrow">DAY BY DAY</p><h2>行程表｜9/25-10/7</h2><button class="primary" id="savePlan">保存整份行程</button><div class="days" id="days"></div><div class="tablewrap"><table id="table"></table></div></section>
  </main><div class="toast" id="toast"></div>
  <script>
    const stops=[
      ["Sigiriya / Dambulla","狮子岩 / 石窟寺 / 包车","https://upload.wikimedia.org/wikipedia/commons/e/e6/Sigiriya_%28141688197%29.jpeg","文化三角核心区域，适合包车串联 Dambulla 石窟寺、Sigiriya Lion Rock 和周边古城。","https://www.google.com/maps?q=Sigiriya+Sri+Lanka"],
      ["Kandy / Ella","佛牙寺 / 茶园火车 / 山谷","https://images.unsplash.com/photo-1546708973-b339540b5162?auto=format&fit=crop&w=900&q=85","Kandy 是人文节点，Ella 是茶园和山谷体验重点，茶园火车建议提前订票。","https://www.google.com/maps?q=Ella+Sri+Lanka"],
      ["Galle / Colombo","古堡 / 海岸 / 中转","https://upload.wikimedia.org/wikipedia/commons/5/54/SL_Galle_Fort_asv2020-01_img24.jpg","Ella 到 Galle 车程较长，适合视体力二选一：Galle 古堡慢逛或直接进 Colombo。","https://www.google.com/maps?q=Galle+Fort+Sri+Lanka"],
      ["Singapore","滨海湾 / 街区 / 松弛游","https://images.unsplash.com/photo-1525625293386-3f8f99389edd?auto=format&fit=crop&w=900&q=85","新加坡段安排滨海湾、Gardens by the Bay、ArtScience、Tiong Bahru、Haji Lane、Jewel Changi。","https://www.google.com/maps?q=Marina+Bay+Singapore"]
    ];
    const heads=["天数","日期","国家/城市","上午","下午","晚上","交通时间 & 方式推荐","住宿位置推荐","景点/注意事项"];
    const rows=[
      ["Day 1","9/25 Fri","中国 → 斯里兰卡","上海出发","飞往 Colombo","抵达休息","上海→Colombo 通常 1 次转机或直飞；抵达后车去 Negombo/Colombo","Negombo 或 Colombo Fort / Cinnamon Gardens","第一天不要赶路，先落地适应"],
      ["Day 2","9/26 Sat","斯里兰卡｜Sigiriya / Dambulla","Colombo/Negombo 出发","Dambulla 石窟寺","入住 Sigiriya","包车约 3.5-4.5h","Sigiriya / Habarana","这段建议包车，不要公共交通"],
      ["Day 3","9/27 Sun","斯里兰卡｜Sigiriya","Sigiriya Lion Rock","Polonnaruwa 古城或 Minneriya Safari","酒店休息","包车一日","同上","狮子岩早上爬，避开热和人"],
      ["Day 4","9/28 Mon","斯里兰卡｜Kandy","前往 Kandy","佛牙寺、湖边 citywalk","Kandy 老酒店晚餐","车程约 2.5-3.5h","Kandy Lake 附近","Kandy 是人文节点，不建议只当中转"],
      ["Day 5","9/29 Tue","斯里兰卡｜Ella","茶园火车 Kandy → Ella","抵达 Ella","山谷餐厅","火车约 6-7h，建议买一等/观景座","Ella 山景民宿/精品酒店","茶园火车是核心体验，但要提前订票"],
      ["Day 6","9/30 Wed","斯里兰卡｜Ella","Little Adam's Peak","Nine Arch Bridge","茶园/咖啡馆","tuk-tuk + 步行","Ella","天气看运气，备雨衣；山地比海边舒服"],
      ["Day 7","10/1 Thu","斯里兰卡｜Galle / Colombo","Ella 出发","视体力去 Galle 或直接 Colombo","入住机场/Colombo","Ella→Galle 约 4.5-5.5h；Galle→Colombo 约 2h","Colombo 或机场附近","为 10/2 直飞新加坡留弹性，不要住太远"],
      ["Day 8","10/2 Fri","斯里兰卡 → 新加坡","Colombo 直飞新加坡","抵达入住","Marina Bay / Bugis 轻松散步","CMB→SIN 直飞约 4h10m，航班较多","Beach Road / Bugis / Marina Bay","10/3 前一天必须轻松，不安排暴走"],
      ["Day 9","10/3 Sat","新加坡","睡到自然醒","cafe + 酒店休息","The Weekend 演唱会","MRT 优先","同上","国家体育场现场叫车用 Grab"],
      ["Day 10","10/4 Sun","新加坡","Gardens by the Bay","ArtScience / MBS","rooftop bar","MRT + 步行","同上","做文明回血"],
      ["Day 11","10/5 Mon","新加坡","Tiong Bahru","Haji Lane / Kampong Glam","河边夜景","MRT + Grab","同上","轻松逛吃"],
      ["Day 12","10/6 Tue","新加坡","酒店泳池/按摩","Jewel Changi 或购物","收拾行李","MRT / Grab","同上","不要再排远景点"],
      ["Day 13","10/7 Wed","新加坡 → 上海","早餐退房","飞回上海","抵达","SIN→PVG 约 5-6h","-","选中午/下午航班最舒服"]
    ];
    const $=s=>document.querySelector(s), state=JSON.parse(localStorage.tripState||'{"guides":[],"likes":{}}');
    function save(){localStorage.tripState=JSON.stringify(state)} function toast(t){$("#toast").textContent=t;$("#toast").classList.add("show");setTimeout(()=>$("#toast").classList.remove("show"),1800)}
    function render(){ $("#cards").innerHTML=stops.map((s,i)=>`<article class=card><img src="${s[2]}"><div class=body><span class=pill>${s[1]}</span><h3>${s[0]}</h3><p>${s[3]}</p><button onclick="like(${i})">${state.likes[i]?"已点赞":"点赞"}</button> <a class="btn" target=_blank href="${s[4]}">地图</a></div></article>`).join("");
      $("#guides").innerHTML=[...state.guides,{title:"斯里兰卡段交通原则",content:"Sigiriya-Dambulla-Kandy-Ella 以包车和茶园火车组合为主，长距离转场预留休息。"},{title:"新加坡段松弛安排",content:"10/2 抵达后只散步，10/3 演唱会日减少白天行程，10/6 留给酒店和购物。"}].map(g=>`<div class=panel><b>${g.title}</b><p>${g.content}</p></div>`).join("");
      $("#days").innerHTML=rows.map((r,i)=>`<article class=day><div class=idx>D${i+1}</div><div><span class=pill>${r[1]}</span><span class=pill>${r[2]}</span><h3>${r[3]} · ${r[4]}</h3><p>${r[5]}｜${r[6]}｜住宿：${r[7]}</p><p><b>注意：</b>${r[8]}</p></div></article>`).join("");
      $("#table").innerHTML=`<thead><tr>${heads.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody>`}
    window.like=i=>{state.likes[i]=!state.likes[i];save();render();toast("已保存")}; render();
    document.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>document.getElementById(b.dataset.go).scrollIntoView({behavior:"smooth"}));
    $("#save").onsubmit=e=>{e.preventDefault();state.guides.unshift(Object.fromEntries(new FormData(e.target)));save();e.target.reset();render();toast("攻略已保存到本机浏览器")};
    $("#savePlan").onclick=()=>{state.guides.unshift({title:"行程表｜9/25-10/7",content:rows.map(r=>r.join("｜")).join("\\n")});save();render();toast("整份行程已保存")};
    $("#search").onsubmit=e=>{e.preventDefault();let q=$("#q").value.toLowerCase();document.querySelectorAll(".day,.card").forEach(el=>el.style.display=el.textContent.toLowerCase().includes(q)?"":"none")};
    $("#share").onclick=()=>navigator.share?navigator.share({title:document.title,url:location.href}):navigator.clipboard.writeText(location.href).then(()=>toast("链接已复制"));
  </script>
</body>
</html>
